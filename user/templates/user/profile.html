{% extends "base.html" %}
{% include "emaployee_sidebar.html" %}

{% block content %}
<div class="container-fluid border rounded-3 mt-5 shadow-sm">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3>Employee Profile</h3>
            <button class="btn btn-primary">Edit</button>
        </div>

        <!-- Profile Section -->
        <div class="row align-items-center">

            <!-- Image -->
            <div class="col-md-4 text-center">

                <img src="https://via.placeholder.com/130" class="profile-img">

            </div>

            <!-- Info -->
            <div class="col-md-8">

                <p><strong>Name :</strong> John Doe</p>

                <p><strong>Email :</strong> johndoe@gmail.com</p>

                <p><strong>Department :</strong> IT</p>

                <p><strong>Join Date :</strong> 15 March 2026</p>

            </div>

        </div>

        <hr>

        <!-- Edit Form -->

        <div class="edit-form">

            <h5 class="mb-3">Update Profile</h5>

            <form>

                <div class="mb-3">
                    <label class="form-label">Profile Picture</label>
                    <input type="file" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Department</label>
                    <select class="form-select">

                        <option selected>Select Department</option>
                        <option>Sales</option>
                        <option>IT</option>
                        <option>HR</option>
                        <option>Finance</option>
                        <option>Marketing</option>

                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Join Date</label>
                    <input type="date" class="form-control">
                </div>

                <button class="btn btn-success">Save Profile</button>

            </form>

        </div>



</div>
